name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  control-plane:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/control-plane/package-lock.json

      - name: Install control-plane deps
        run: npm ci
        working-directory: apps/control-plane

      - name: Run control-plane tests
        run: npm test
        working-directory: apps/control-plane

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json

      - name: Install web deps
        run: npm ci
        working-directory: apps/web

      - name: Build web
        run: npm run build
        working-directory: apps/web
